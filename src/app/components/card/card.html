<div class="">
    <div class="row border border-primary mb-3 p-3" *ngFor="let i of [1, 2, 3, 4, 5]">
        <div class="col col-3">
            <img src="..." class="card-img-top" alt="...">
        </div>
        <div class="col col-4 card-body">
            <h5 class="card-title">{{title}}</h5>
            <p class="card-text">{{content}}</p>
            <div class="row " style="">
                <div class="col col-2 border border-primary m-1">
                    <p>Like</p>
                </div>
                <div class="col col-2 border border-primary m-1">
                    <p>Comment</p>
                </div>
                <div class="col col-2 border border-primary m-1">
                    <p>Share</p>
                </div>
                <div class="col col-2 border border-primary m-1"><a href="/signup" class="btn btn-primary"
                        style="width: 100%;">Repost</a></div>
            </div>

        </div>
        
    </div>
</div>
